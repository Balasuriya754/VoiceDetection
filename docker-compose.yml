

services:
  speaker-id:
    build: .
    container_name: speaker_identity_app
    ports:
      - "8010:8000"
    volumes:
      # Persist speaker DB
      - ./data:/app/data
      # Mount model
      - ./3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx:/app/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped